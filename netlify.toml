[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[[edge_functions]]
  function = "auth-apply"
  path = "/apply"

[[edge_functions]]
  function = "auth-apply"
  path = "/apply/*"

[[headers]]
  for = "/apply/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
